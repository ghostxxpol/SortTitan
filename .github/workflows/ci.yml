name: ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["*"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SortTitan/SortTitan.sln

      - name: Test (with coverage)
        run: dotnet test SortTitan/SortTitan.sln -c Release --no-restore --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Enforce coverage threshold (>= 50%)
        run: |
          python3 - << 'PY'
          import glob
          import xml.etree.ElementTree as ET

          files = glob.glob("TestResults/**/coverage.cobertura.xml", recursive=True)
          if not files:
            raise SystemExit("coverage.cobertura.xml not found")

          path = files[0]
          root = ET.parse(path).getroot()
          rate = float(root.attrib.get("line-rate", "0"))
          pct = rate * 100.0
          print(f"Coverage file: {path}")
          print(f"Line coverage: {pct:.2f}%")

          if pct < 50.0:
            raise SystemExit(f"Coverage below threshold: {pct:.2f}% < 50.00%")
          PY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: cobertura
          path: TestResults/**/coverage.cobertura.xml

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/sorttitan
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: ./SortTitan
          file: ./SortTitan/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
