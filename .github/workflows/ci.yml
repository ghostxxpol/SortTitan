name: ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["*"]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SortTitan/SortTitan.sln

      - name: Test (with coverage)
        run: dotnet test SortTitan/SortTitan.sln -c Release --no-restore --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Enforce coverage threshold (>= 50%)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "TestResults" -Recurse -Filter "coverage.cobertura.xml" -ErrorAction SilentlyContinue
          if (-not $files -or $files.Count -eq 0) {
            throw "coverage.cobertura.xml not found"
          }

          $path = $files[0].FullName
          [xml]$xml = Get-Content -Path $path
          $rateText = $xml.coverage.'line-rate'
          if (-not $rateText) {
            $rateText = "0"
          }

          $rate = [double]$rateText
          $pct = $rate * 100.0
          Write-Host "Coverage file: $path"
          Write-Host ("Line coverage: {0:N2}%" -f $pct)

          if ($pct -lt 50.0) {
            throw ("Coverage below threshold: {0:N2}% < 50.00%" -f $pct)
          }

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: cobertura
          path: TestResults/**/coverage.cobertura.xml

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/sorttitan
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: ./SortTitan
          file: ./SortTitan/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
